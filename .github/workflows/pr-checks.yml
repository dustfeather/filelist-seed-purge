name: PR checks

on:
    pull_request:
        types: [opened, synchronize, reopened, closed]
        # Self-modify validation guard: only ignore THIS file (narrow), not the
        # broader .github/** tree, so other workflow PRs still get reviewed.
        paths-ignore:
            - '.github/workflows/pr-checks.yml'

permissions:
    contents: read

concurrency:
    group: pr-checks-${{ github.ref }}
    cancel-in-progress: true

jobs:
    tests:
        if: github.event.action != 'closed'
        permissions:
            contents: read
        uses: dustfeather/shared-workflows/.github/workflows/node-test.yml@v4
        with:
            runner: arc-df-shared-workflows
            run-build: true

    review:
        if: github.event.action != 'closed'
        needs: tests
        permissions:
            contents: read
            pull-requests: write
            issues: read
            id-token: write
        uses: dustfeather/shared-workflows/.github/workflows/claude-code-review.yml@v4
        with:
            runner: arc-df-shared-workflows
        secrets: inherit
